<style>
*{ box-sizing:border-box; }

body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:#fff;
}

/* Container */
.container{
    width:100%;
    max-width:500px;
    margin:auto;
    padding:10px;
}

/* Card */
.card{
    background:#1e293b;
    border-radius:12px;
    padding:10px;
    margin-bottom:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-3px);
}

/* Video */
.video{
    position:relative;
}

.video img{
    width:100%;
    border-radius:10px;
    display:block;
}

/* Play Icon */
.play{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:30px;
    background:rgba(0,0,0,0.6);
    padding:8px 12px;
    border-radius:50%;
}

/* Title */
.title{
    font-weight:bold;
    margin:10px 0;
    font-size:15px;
    color:#facc15;
}

/* Buttons */
.buttons{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.buttons a{
    flex:1 1 30%;
    text-align:center;
    padding:8px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    color:#fff;
    font-size:13px;
    transition:0.3s;
}

.buttons a:hover{
    transform:scale(1.05);
    opacity:0.9;
}

.btn1{ background:#3b82f6; }
.btn2{ background:#22c55e; }
.btn3{ background:#f97316; }

/* Text */
.desc{
    font-size:12px;
    color:#ccc;
    margin-top:8px;
}

.stats{
  margin-top:8px;
  font-size:13px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.left-stats{
  display:flex;
  gap:10px;
}

.download{
  color:#22c55e;
  font-weight:bold;
}

/* Loader */
#loader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:99999;
}

.spinner{
  border:5px solid #333;
  border-top:5px solid #22c55e;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{ transform:rotate(360deg); }
}

    
</style>
